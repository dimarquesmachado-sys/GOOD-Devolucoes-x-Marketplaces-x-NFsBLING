<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOOD - Devolucoes Marketplaces</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f7; min-height: 100vh; padding: 12px; color: #1d1d1f;
    }
    .container { max-width: 720px; margin: 0 auto; }
    @media (min-width: 900px) { .container { max-width: 1200px; } }

    header {
      background: linear-gradient(135deg, #FFE600 0%, #FFCC00 100%);
      border-radius: 12px; padding: 20px; margin-bottom: 14px; text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    header h1 { font-size: 20px; margin-bottom: 4px; }
    header p { font-size: 13px; color: #555; }
    .card {
      background: white; border-radius: 12px; padding: 18px; margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .card h2 { font-size: 16px; margin-bottom: 12px; }
    .input-group { display: flex; gap: 8px; margin-bottom: 10px; }
    input[type="text"] {
      flex: 1; padding: 14px 16px; border: 2px solid #e0e0e0; border-radius: 10px;
      font-size: 16px; outline: none;
    }
    input[type="text"]:focus { border-color: #007AFF; }
    button {
      padding: 14px 22px; background: #007AFF; color: white; border: none;
      border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer;
    }
    button:hover { background: #0051D5; }
    button:disabled { background: #B0B0B0; cursor: not-allowed; }
    .hint { font-size: 12px; color: #666; line-height: 1.5; }
    .resultado { display: none; }
    .resultado.show { display: block; }

    .grid-desktop { display: grid; grid-template-columns: 1fr; gap: 14px; }
    @media (min-width: 900px) {
      .grid-desktop { grid-template-columns: 1fr 1fr; gap: 14px 18px; }
      .grid-desktop > .secao-nf { grid-column: 1 / -1; }
      .grid-desktop > .secao-timeline { grid-column: 1 / -1; }
    }

    .badge {
      display: inline-block; padding: 4px 10px; border-radius: 12px;
      font-size: 11px; font-weight: 600; margin-right: 6px; margin-bottom: 4px;
    }
    .badge-sucesso { background: #d1f7c4; color: #1a7f3d; }
    .badge-info { background: #d6e9ff; color: #003d99; }
    .badge-devolucao { background: #ffe0b3; color: #8a4d00; }
    .badge-nfe { background: #c8e6c9; color: #1b5e20; }
    .badge-fonte-ml { background: #fff4cc; color: #8a6d00; }
    .badge-fonte-bling { background: #d4edda; color: #155724; }

    .item-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px 14px; margin-top: 10px;
    }
    .item-grid .label {
      font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.4px;
    }
    .item-grid .valor {
      font-size: 14px; color: #1d1d1f; font-weight: 500; word-break: break-word;
    }
    .item-grid .valor strong { font-weight: 700; }

    .produto-titulo { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .produto-mlb { font-size: 12px; color: #007AFF; margin-bottom: 8px; }
    .secao-titulo {
      font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase;
      letter-spacing: 0.4px; margin: 0 0 6px; padding-bottom: 5px;
      border-bottom: 1px solid #f0f0f0;
    }

    .secao-nf {
      background: linear-gradient(135deg, #e8f5e9 0%, #f1f8e9 100%);
      border-radius: 10px; padding: 14px;
      border-left: 4px solid #2e7d32;
    }
    .secao-nf-titulo {
      font-size: 13px; font-weight: 700; color: #1b5e20;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;
    }
    .erro-box {
      background: #fff5f5; border: 1px solid #ffd6d6; border-radius: 10px;
      padding: 14px; color: #b00020; font-size: 14px;
    }
    .aviso-box {
      background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px;
      padding: 12px; color: #92400e; font-size: 13px; margin-bottom: 10px;
    }
    .nfe-numero {
      font-size: 24px; font-weight: 800; color: #1b5e20; letter-spacing: 0.5px;
    }
    .nfe-chave {
      font-family: 'Courier New', monospace; font-size: 12px;
      background: white; padding: 8px 10px; border-radius: 6px;
      word-break: break-all; margin-top: 4px; border: 1px solid #c8e6c9;
    }
    .btn-action {
      display: inline-block; padding: 8px 14px; background: #2e7d32;
      color: white; border-radius: 8px; text-decoration: none;
      font-size: 13px; font-weight: 600; margin-top: 8px; margin-right: 6px;
      border: none; cursor: pointer; font-family: inherit;
    }
    .btn-action:hover { background: #1b5e20; }
    .btn-action.azul { background: #007AFF; }
    .btn-action.azul:hover { background: #0051D5; }
    .btn-action.cinza { background: #6c757d; }
    .btn-action.cinza:hover { background: #495057; }
    .btn-action:disabled { background: #B0B0B0; cursor: not-allowed; }
    .loading { display: none; text-align: center; padding: 24px; }
    .loading.show { display: block; }
    .spinner {
      display: inline-block; width: 32px; height: 32px;
      border: 3px solid #f0f0f0; border-top-color: #007AFF;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    .spinner-mini {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid #fff; border-top-color: transparent;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      vertical-align: middle; margin-right: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .timeline { list-style: none; padding-left: 0; }
    .timeline li {
      padding: 6px 0 6px 18px; position: relative; font-size: 13px;
    }
    .timeline li::before {
      content: ''; position: absolute; left: 0; top: 11px;
      width: 7px; height: 7px; background: #007AFF; border-radius: 50%;
    }
    .timeline-data { color: #888; font-size: 11px; }

    details {
      margin-top: 10px; border: 1px solid #e0e0e0; border-radius: 8px;
      padding: 8px 12px; background: #fafafa;
    }
    summary { cursor: pointer; font-size: 12px; color: #555; user-select: none; }
    summary:hover { color: #007AFF; }
    .json-raw {
      background: #1d1d1f; color: #a8e6cf; padding: 12px; border-radius: 8px;
      margin-top: 8px; font-family: 'Courier New', monospace; font-size: 11px;
      overflow-x: auto; white-space: pre-wrap; word-break: break-all;
    }
    .tentativas-list {
      font-size: 12px; padding-left: 20px; color: #666; margin-top: 6px;
    }
    .tentativas-list li { margin: 4px 0; }
    .tentativas-list code {
      background: #f0f0f0; padding: 1px 5px; border-radius: 3px;
      font-family: 'Courier New', monospace;
    }

    @media (max-width: 480px) {
      .item-grid { grid-template-columns: 1fr; }
      .input-group { flex-direction: column; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <h1>📦 GOOD Devolucoes</h1>
      <p>Identificar venda + NF-e da etiqueta</p>
      <p style="font-size: 10px; color: #888; margin-top: 4px;">v3.5 (NFs Bling) | <span id="serverVersion">checando...</span></p>
    </header>

    <div class="card">
      <h2>🔍 Buscar devolucao</h2>
      <div class="input-group">
        <input type="text" id="codigo"
          placeholder="Bipe ou cole o codigo da etiqueta"
          autocomplete="off" inputmode="numeric" />
        <button id="btnBuscar" onclick="buscar()">Buscar</button>
      </div>
      <p class="hint">
        💡 Aceita Pack ID (ex: 2000012153272513) ou codigo de barras de envio (ex: 46862577049).
      </p>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p style="margin-top: 12px; color: #666;">Consultando ML...</p>
    </div>

    <div class="resultado" id="resultado"></div>

  </div>

  <script>
    const inputCodigo = document.getElementById('codigo');
    const btnBuscar = document.getElementById('btnBuscar');
    const divLoading = document.getElementById('loading');
    const divResultado = document.getElementById('resultado');

    // Estado pra suportar busca sob demanda
    let ultimaOrderId = null;
    let ultimaDataVenda = null;
    let ultimoNumeroNF = null;

    inputCodigo.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); buscar(); }
    });
    window.addEventListener('load', () => {
      inputCodigo.focus();
      // Checa versao do server
      fetch('/health').then(r => r.json()).then(d => {
        const span = document.getElementById('serverVersion');
        if (span) span.textContent = `server v${d.version || '?'}`;
      }).catch(() => {});
    });

    async function buscar() {
      const codigo = inputCodigo.value.trim();
      if (!codigo) { alert('Digite ou bipe um codigo'); return; }

      divResultado.classList.remove('show');
      divResultado.innerHTML = '';
      divLoading.classList.add('show');
      btnBuscar.disabled = true;

      try {
        const resp = await fetch(`/api/devolucao/identificar/${encodeURIComponent(codigo)}`);
        const data = await resp.json();
        renderizar(data, resp.ok);
      } catch (err) {
        renderizarErro('Erro de conexao: ' + err.message);
      } finally {
        divLoading.classList.remove('show');
        btnBuscar.disabled = false;
        inputCodigo.select();
      }
    }

    // Busca sob demanda dos links Bling
    async function buscarLinksBling(orderId, dataVenda, numeroNF) {
      const btn = document.getElementById('btnBlingDemanda');
      if (!btn) return;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-mini"></span>Buscando no Bling...';

      try {
        const params = new URLSearchParams();
        if (dataVenda) params.set('data', dataVenda);
        if (numeroNF) params.set('numeroNF', numeroNF);
        const queryStr = params.toString() ? `?${params.toString()}` : '';
        const url = `/api/nf/buscar-links-bling/${encodeURIComponent(orderId)}${queryStr}`;
        const resp = await fetch(url);
        const data = await resp.json();

        const containerBotoes = document.getElementById('botoesNF');
        if (!containerBotoes) return;

        if (data.ok && data.nf) {
          // Sucesso - substitui o botao por links Bling
          let novosBotoes = '';
          if (data.nf.linkDanfe) novosBotoes += `<a href="${data.nf.linkDanfe}" target="_blank" class="btn-action">📄 DANFE Bling</a>`;
          if (data.nf.linkPdf) novosBotoes += `<a href="${data.nf.linkPdf}" target="_blank" class="btn-action">📥 Baixar PDF</a>`;
          if (data.nf.linkXml) novosBotoes += `<a href="${data.nf.linkXml}" target="_blank" class="btn-action">📋 XML</a>`;
          if (data.nf.idBling) novosBotoes += `<a href="https://www.bling.com.br/notas.fiscais.php#edit/${data.nf.idBling}" target="_blank" class="btn-action azul">🔗 Editar no Bling</a>`;

          // Adiciona badge de sucesso
          const badgeFonte = document.querySelector('.badge-fonte-ml, .badge-fonte-bling');
          if (badgeFonte) {
            badgeFonte.className = 'badge badge-fonte-bling';
            badgeFonte.textContent = 'via Bling + ML';
          }

          // Substitui o botao Bling pelos links Bling
          btn.outerHTML = novosBotoes;
        } else {
          // Falha - mostra mensagem
          btn.disabled = false;
          btn.style.background = '#b00020';
          btn.innerHTML = '⚠️ Nao localizado no Bling';
          setTimeout(() => {
            btn.style.background = '';
            btn.innerHTML = '🔍 Tentar Bling de novo';
            btn.disabled = false;
          }, 3000);
          console.warn('[Bling sob demanda] Falha:', data.erro);
        }
      } catch (err) {
        btn.disabled = false;
        btn.innerHTML = '⚠️ Erro de conexao';
        console.error(err);
      }
    }

    function moeda(v) {
      if (v == null) return '-';
      return 'R$ ' + Number(v).toFixed(2).replace('.', ',');
    }
    function dataFmt(iso) {
      if (!iso) return '-';
      try {
        return new Date(iso).toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' });
      } catch { return iso; }
    }

    function renderizar(data, ok) {
      if (!ok || !data.encontrado) {
        renderizarErro(data.erro || 'Codigo nao encontrado', data.tentativas);
        return;
      }

      const order = data.order || {};
      const shipment = data.shipment || {};
      const claim = data.claim || {};
      const nf = data.nf || null;

      // Salva pra busca sob demanda Bling
      ultimaOrderId = order.id || null;
      ultimaDataVenda = order.date_created || null;
      ultimoNumeroNF = nf?.numero || null;

      const itemOrder = order.order_items?.[0];
      const itemShip = shipment.shipping_items?.[0];
      const buyer = order.buyer || {};
      const payment = order.payments?.[0] || {};

      const tituloProduto = itemOrder?.item?.title || itemShip?.description || '-';
      const mlb = itemOrder?.item?.id || itemShip?.id || '-';
      const sku = itemOrder?.item?.seller_sku || '-';
      const qtd = itemOrder?.quantity || itemShip?.quantity || '-';
      const valorUnit = itemOrder?.unit_price;
      const valorTotal = order?.total_amount;
      const variacao = itemOrder?.item?.variation_attributes?.length
        ? itemOrder.item.variation_attributes.map(v => `${v.name}: ${v.value_name}`).join(' | ')
        : null;

      const buyerNome = buyer.first_name
        ? `${buyer.first_name} ${buyer.last_name || ''}`.trim()
        : '-';
      const buyerNick = buyer.nickname || '-';
      const buyerId = buyer.id || '-';

      const ehDevolucao = data.eh_devolucao;

      let html = '<div class="card">';

      // BADGES TOPO
      html += ehDevolucao
        ? '<span class="badge badge-devolucao">📦 DEVOLUCAO</span>'
        : '<span class="badge badge-info">📦 ENVIO</span>';
      html += `<span class="badge badge-info">Metodo: ${data.metodo || '-'}</span>`;
      if (order && order.id) html += '<span class="badge badge-sucesso">✅ Order ML</span>';
      if (nf) {
        html += '<span class="badge badge-nfe">🧾 NF-e</span>';
        html += '<span class="badge badge-fonte-ml">via Mercado Livre</span>';
      }

      // AVISOS
      if (data.avisos?.length) {
        data.avisos.forEach(a => {
          html += `<div class="aviso-box" style="margin-top:10px;">⚠️ ${a.mensagem}</div>`;
        });
      }

      // ====== GRID 2 COLUNAS ======
      html += '<div class="grid-desktop" style="margin-top:14px;">';

      // ============ NF (LARGURA TOTAL) ============
      if (nf) {
        html += '<div class="secao-nf">';
        html += '<div class="secao-nf-titulo">🧾 Nota Fiscal</div>';
        html += '<div class="item-grid">';
        html += `<div><div class="label">Numero NF-e</div><div class="valor"><span class="nfe-numero">${nf.numero || '-'}</span></div></div>`;
        html += `<div><div class="label">Serie</div><div class="valor"><strong>${nf.serie || '-'}</strong></div></div>`;
        html += `<div><div class="label">Data emissao</div><div class="valor">${dataFmt(nf.dataEmissao)}</div></div>`;
        html += `<div><div class="label">Valor NF</div><div class="valor"><strong>${moeda(nf.valor)}</strong></div></div>`;
        if (nf.peso) {
          html += `<div><div class="label">Peso</div><div class="valor">${nf.peso}g</div></div>`;
        }
        if (nf.chaveAcesso) {
          html += `<div style="grid-column: 1/-1;"><div class="label">Chave de acesso</div><div class="nfe-chave">${nf.chaveAcesso}</div></div>`;
        }
        html += '</div>';

        // Botoes - so o de buscar Bling sob demanda
        html += '<div style="margin-top: 12px;" id="botoesNF">';
        if (ultimaOrderId) {
          html += `<button id="btnBlingDemanda" class="btn-action" onclick="buscarLinksBling('${ultimaOrderId}', '${ultimaDataVenda || ''}', '${ultimoNumeroNF || ''}')">🔍 Buscar links da NF (~3s)</button>`;
        }
        html += '</div>';
        html += '</div>';
      } else if (ultimaOrderId) {
        // Sem NF do ML - oferece botao Bling como ultima alternativa
        html += '<div class="secao-nf">';
        html += '<div class="secao-nf-titulo">🧾 Nota Fiscal</div>';
        html += '<p style="margin: 10px 0;">⚠️ NF-e nao localizada via Mercado Livre.</p>';
        html += '<div id="botoesNF">';
        html += `<button id="btnBlingDemanda" class="btn-action" onclick="buscarLinksBling('${ultimaOrderId}', '${ultimaDataVenda || ''}', '')">🔍 Buscar no Bling (~5s)</button>`;
        html += '</div>';
        html += '</div>';
      }

      // ============ PRODUTO ============
      html += '<div class="bloco">';
      html += '<div class="secao-titulo">Produto</div>';
      html += `<div class="produto-titulo">${tituloProduto}</div>`;
      if (mlb !== '-') html += `<div class="produto-mlb">${mlb}</div>`;
      html += '<div class="item-grid">';
      html += `<div><div class="label">SKU (Bling)</div><div class="valor"><strong>${sku}</strong></div></div>`;
      html += `<div><div class="label">Quantidade</div><div class="valor">${qtd} un</div></div>`;
      html += `<div><div class="label">Valor unitario</div><div class="valor">${moeda(valorUnit)}</div></div>`;
      html += `<div><div class="label">Valor total</div><div class="valor"><strong>${moeda(valorTotal)}</strong></div></div>`;
      if (variacao) {
        html += `<div style="grid-column: 1/-1;"><div class="label">Variacao</div><div class="valor">${variacao}</div></div>`;
      }
      html += '</div>';
      html += '</div>';

      // ============ COMPRADOR ============
      html += '<div class="bloco">';
      html += '<div class="secao-titulo">Comprador</div>';
      html += '<div class="item-grid">';
      html += `<div><div class="label">Nome</div><div class="valor">${buyerNome}</div></div>`;
      html += `<div><div class="label">Nickname</div><div class="valor">${buyerNick}</div></div>`;
      html += `<div><div class="label">ID</div><div class="valor">${buyerId}</div></div>`;
      html += `<div><div class="label">Data da venda</div><div class="valor">${dataFmt(order.date_created)}</div></div>`;
      html += '</div>';
      html += '</div>';

      // ============ PEDIDO ============
      html += '<div class="bloco">';
      html += '<div class="secao-titulo">Pedido</div>';
      html += '<div class="item-grid">';
      html += `<div><div class="label">Order ID (ML)</div><div class="valor">${order.id || '-'}</div></div>`;
      html += `<div><div class="label">Pack ID</div><div class="valor">${order.pack_id || '-'}</div></div>`;
      html += `<div><div class="label">Status venda</div><div class="valor">${traduzirStatus(order.status)}</div></div>`;
      html += `<div><div class="label">Status pagamento</div><div class="valor">${traduzirPagamento(payment.status)}${payment.transaction_amount_refunded ? ' (estornado: ' + moeda(payment.transaction_amount_refunded) + ')' : ''}</div></div>`;
      html += '</div>';
      html += '</div>';

      // ============ ENVIO ============
      if (shipment.id) {
        html += '<div class="bloco">';
        html += '<div class="secao-titulo">Envio / Devolucao</div>';
        html += '<div class="item-grid">';
        html += `<div><div class="label">Shipment ID</div><div class="valor">${shipment.id}</div></div>`;
        html += `<div><div class="label">Status envio</div><div class="valor">${traduzirStatusEnvio(shipment.status)}</div></div>`;
        html += `<div><div class="label">Tipo</div><div class="valor">${shipment.type || 'forward'}</div></div>`;
        html += `<div><div class="label">Custo do envio</div><div class="valor">${moeda(shipment.base_cost)}</div></div>`;
        if (shipment.tags?.length) {
          html += `<div style="grid-column: 1/-1;"><div class="label">Tags ML</div><div class="valor">${shipment.tags.join(', ')}</div></div>`;
        }
        html += '</div>';
        html += '</div>';
      }

      // ============ TIMELINE ============
      if (shipment.status_history) {
        const sh = shipment.status_history;
        html += '<div class="secao-timeline">';
        html += '<div class="secao-titulo">📍 Linha do tempo</div>';
        html += '<ul class="timeline">';
        if (sh.date_handling) html += `<li>Preparado <span class="timeline-data">${dataFmt(sh.date_handling)}</span></li>`;
        if (sh.date_ready_to_ship) html += `<li>Etiqueta gerada <span class="timeline-data">${dataFmt(sh.date_ready_to_ship)}</span></li>`;
        if (sh.date_shipped) html += `<li>Enviado <span class="timeline-data">${dataFmt(sh.date_shipped)}</span></li>`;
        if (sh.date_delivered) html += `<li><strong>Entregue ${ehDevolucao ? 'no galpao' : 'ao comprador'}</strong> <span class="timeline-data">${dataFmt(sh.date_delivered)}</span></li>`;
        html += '</ul>';
        html += '</div>';
      }

      // ============ CLAIM ============
      if (claim.id) {
        html += '<div class="secao-timeline">';
        html += '<div class="secao-titulo">⚖️ Reclamacao (Claim)</div>';
        html += '<div class="item-grid">';
        html += `<div><div class="label">Claim ID</div><div class="valor">${claim.id}</div></div>`;
        html += `<div><div class="label">Status</div><div class="valor">${claim.status || '-'}</div></div>`;
        html += `<div><div class="label">Tipo</div><div class="valor">${claim.type || '-'}</div></div>`;
        html += `<div><div class="label">Estagio</div><div class="valor">${claim.stage || '-'}</div></div>`;
        if (claim.reason_id) {
          html += `<div style="grid-column:1/-1;"><div class="label">Motivo</div><div class="valor">${claim.reason_id}</div></div>`;
        }
        html += '</div>';
        html += '</div>';
      }

      html += '</div>'; // fim grid-desktop

      // DEBUG
      html += '<details><summary>🔧 Tentativas e diagnostico</summary>';
      html += '<ul class="tentativas-list">';
      data.tentativas.forEach(t => {
        const icone = t.ok ? '✅' : '❌';
        html += `<li>${icone} <strong>${t.tipo}</strong>: <code>${t.codigo}</code> → status ${t.status || '?'}`;
        if (t.tem_fiscal_key !== undefined) html += ` <em>(fiscal_key: ${t.tem_fiscal_key ? 'SIM' : 'NAO'})</em>`;
        if (t.encontradas !== undefined) html += ` <em>(${t.encontradas} encontradas)</em>`;
        if (t.claims_encontradas !== undefined) html += ` <em>(${t.claims_encontradas} claims)</em>`;
        if (t.erro) {
          const errStr = typeof t.erro === 'object' ? JSON.stringify(t.erro) : t.erro;
          html += ` <span style="color:#b00020;">(${errStr.substring(0, 100)})</span>`;
        }
        html += '</li>';
      });
      html += '</ul></details>';

      html += '<details><summary>📋 Ver JSON completo</summary>';
      html += `<div class="json-raw">${JSON.stringify(data, null, 2)}</div>`;
      html += '</details>';

      html += '</div>';

      divResultado.innerHTML = html;
      divResultado.classList.add('show');
    }

    function renderizarErro(mensagem, tentativas) {
      let html = '<div class="card"><div class="erro-box"><strong>❌ ' + mensagem + '</strong></div>';
      if (tentativas?.length) {
        html += '<div class="secao-titulo" style="margin-top:14px;">Tentativas</div><ul class="tentativas-list">';
        tentativas.forEach(t => {
          html += `<li>${t.tipo}: <code>${t.codigo}</code> → status ${t.status}`;
          if (t.erro) {
            const errStr = typeof t.erro === 'object' ? JSON.stringify(t.erro) : t.erro;
            html += ` <span style="color:#b00020;">(${errStr.substring(0, 150)})</span>`;
          }
          html += '</li>';
        });
        html += '</ul>';
      }
      html += '</div>';
      divResultado.innerHTML = html;
      divResultado.classList.add('show');
    }

    function traduzirStatus(s) {
      const mapa = {
        'paid': '✅ Paga', 'cancelled': '❌ Cancelada',
        'pending': '⏳ Pendente', 'confirmed': '✅ Confirmada',
        'invalid': '⚠️ Invalida',
      };
      return mapa[s] || s || '-';
    }
    function traduzirPagamento(s) {
      const mapa = {
        'approved': '✅ Aprovado', 'refunded': '↩️ Estornado',
        'cancelled': '❌ Cancelado', 'pending': '⏳ Pendente',
        'rejected': '⚠️ Rejeitado',
      };
      return mapa[s] || s || '-';
    }
    function traduzirStatusEnvio(s) {
      const mapa = {
        'delivered': '✅ Entregue', 'shipped': '🚚 Em transito',
        'ready_to_ship': '📦 Pronto', 'pending': '⏳ Pendente',
        'cancelled': '❌ Cancelado', 'not_delivered': '⚠️ Nao entregue',
      };
      return mapa[s] || s || '-';
    }
  </script>
</body>
