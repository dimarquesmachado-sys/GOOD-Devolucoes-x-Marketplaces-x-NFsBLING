<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - GOOD Devolucoes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f7; min-height: 100vh; padding: 12px; color: #1d1d1f;
    }
    .container { max-width: 1200px; margin: 0 auto; }

    header {
      background: linear-gradient(135deg, #1d1d1f 0%, #3a3a3c 100%);
      border-radius: 12px; padding: 20px; margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15); color: white;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap;
    }
    header h1 { font-size: 20px; }
    header p { font-size: 12px; opacity: 0.7; margin-top: 2px; }
    .header-acoes {
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .header-acoes a {
      color: white; padding: 8px 14px; background: rgba(255,255,255,0.15);
      border-radius: 8px; text-decoration: none; font-size: 13px; font-weight: 600;
    }
    .header-acoes a:hover { background: rgba(255,255,255,0.25); }

    /* v3.14.9: no mobile (<=600px), header em coluna pra nao sobrepor titulo */
    @media (max-width: 600px) {
      header {
        flex-direction: column; align-items: flex-start;
        padding: 16px;
      }
      header h1 { font-size: 18px; }
      .header-acoes { width: 100%; }
      .header-acoes a {
        flex: 1; text-align: center; padding: 10px 8px;
        font-size: 12px;
      }
    }

    .secoes {
      display: grid; grid-template-columns: 1fr; gap: 14px;
    }
    @media (min-width: 1000px) {
      .secoes { grid-template-columns: 1fr 1fr; }
    }

    .secao {
      background: white; border-radius: 12px; padding: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .secao h2 {
      font-size: 16px; margin-bottom: 12px; padding-bottom: 8px;
      border-bottom: 2px solid #f0f0f0;
      display: flex; align-items: center; gap: 8px;
    }
    .badge-count {
      background: #007AFF; color: white; padding: 2px 8px;
      border-radius: 10px; font-size: 12px; font-weight: 700; margin-left: auto;
    }
    .badge-count.zero { background: #999; }
    .badge-count.problema { background: #c62828; }

    .item {
      background: #fafafa; border-radius: 10px; padding: 14px;
      margin-bottom: 10px; border-left: 4px solid #43a047;
    }
    .item.problema { border-left-color: #c62828; background: #fff5f5; }
    .item.concluido { opacity: 0.6; border-left-color: #999; background: #f0f0f0; }

    .item-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 8px;
    }
    .item-titulo {
      font-size: 14px; font-weight: 700; color: #1d1d1f;
    }
    .item-data {
      font-size: 11px; color: #888;
    }
    .item-detalhes {
      font-size: 12px; color: #555; line-height: 1.6;
    }
    .item-detalhes strong { color: #1d1d1f; }
    .item-acoes {
      display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;
    }
    .btn {
      padding: 8px 12px; background: #007AFF; color: white; border: none;
      border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer;
      text-decoration: none; display: inline-block; font-family: inherit;
    }
    .btn:hover { background: #0051D5; }
    .btn-verde { background: #2e7d32; }
    .btn-verde:hover { background: #1b5e20; }
    .btn-cinza { background: #6c757d; }
    .btn-cinza:hover { background: #495057; }
    .btn-vermelho { background: #c62828; }
    .btn-vermelho:hover { background: #b71c1c; }

    .vazio {
      text-align: center; padding: 40px 20px; color: #999; font-size: 14px;
    }

    .fotos-mini {
      display: flex; gap: 6px; flex-wrap: wrap; margin: 10px 0;
    }
    .fotos-mini img {
      width: 70px; height: 70px; object-fit: cover; border-radius: 6px;
      border: 1px solid #ddd; cursor: pointer; transition: transform 0.1s;
    }
    .fotos-mini img:hover { transform: scale(1.05); border-color: #007AFF; }

    .descricao-problema {
      background: white; border: 1px solid #fde68a; border-radius: 8px;
      padding: 8px 10px; margin-top: 8px; font-size: 13px;
      color: #92400e; font-style: italic; line-height: 1.5;
    }

    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #1d1d1f; color: white; padding: 12px 20px; border-radius: 10px;
      font-size: 14px; font-weight: 600; box-shadow: 0 4px 14px rgba(0,0,0,0.3);
      z-index: 2000; opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast.ok { background: #2e7d32; }
    .toast.err { background: #c62828; }

    /* Modal foto fullscreen */
    .modal-foto {
      position: fixed; top:0;left:0;right:0;bottom:0;
      background: rgba(0,0,0,0.9); display: none; align-items: center;
      justify-content: center; z-index: 3000; padding: 20px; cursor: pointer;
    }
    .modal-foto.show { display: flex; }
    .modal-foto img {
      max-width: 100%; max-height: 100%; border-radius: 8px;
    }

    .filtros {
      background: white; border-radius: 10px; padding: 14px 16px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .filtros-linha {
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
      font-size: 13px;
    }
    .filtros-linha + .filtros-linha { margin-top: 10px; }
    .filtros label {
      display: flex; align-items: center; gap: 6px; cursor: pointer;
      user-select: none; white-space: nowrap;
    }
    .filtros input[type="text"], .filtros input[type="date"] {
      padding: 8px 12px; border: 1px solid #d0d0d0; border-radius: 6px;
      font-size: 13px; font-family: inherit; outline: none;
    }
    .filtros input[type="text"]:focus, .filtros input[type="date"]:focus {
      border-color: #007AFF;
    }
    .filtros .busca {
      flex: 1; min-width: 200px;
    }
    .filtros button {
      padding: 8px 14px; background: #007AFF; color: white;
      border: none; border-radius: 6px; font-size: 13px; font-weight: 600;
      cursor: pointer;
    }
    .filtros button.ghost {
      background: #f0f0f0; color: #555;
    }
    .filtros .resultado-info {
      font-size: 12px; color: #888; margin-left: auto;
    }
    .loading { text-align: center; padding: 40px; color: #666; }
    .loading .spinner {
      display: inline-block; width: 28px; height: 28px;
      border: 3px solid #f0f0f0; border-top-color: #007AFF;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>🔐 Admin - GOOD Devolucoes</h1>
        <p>Painel restrito · v3.15.0 (gerar NF devolução)</p>
      </div>
      <div class="header-acoes">
        <a href="/">📦 Triagem (bipar)</a>
        <a href="#" onclick="logout(event)">🚪 Sair</a>
      </div>
    </header>

    <div class="filtros">
      <div class="filtros-linha">
        <input type="text" class="busca" id="filtroBusca"
          placeholder="🔍 Buscar por NF, pedido, SKU, cliente, MLB..."
          onkeydown="if(event.key==='Enter') renderizar()" />
        <button onclick="renderizar()">🔍 Buscar</button>
        <button class="ghost" onclick="limparBusca()">Limpar</button>
      </div>
      <div class="filtros-linha">
        <label>De:
          <input type="date" id="filtroDataIni">
        </label>
        <label>Ate:
          <input type="date" id="filtroDataFim">
        </label>
        <label>
          <input type="checkbox" id="mostrarConcluidos">
          Mostrar concluidos
        </label>
        <button onclick="carregar()">🔄 Recarregar</button>
        <span class="resultado-info" id="resultadoInfo"></span>
      </div>
    </div>

    <div id="loadingArea" class="loading">
      <div class="spinner"></div>
      <p style="margin-top:12px;">Carregando devolucoes...</p>
    </div>

    <div class="secoes" id="secoes" style="display:none;">

      <div class="secao">
        <h2>
          ✅ Aprovadas - aguardando NF
          <span class="badge-count" id="countAprovadas">0</span>
        </h2>
        <div id="listaAprovadas"></div>
      </div>

      <div class="secao">
        <h2>
          ⚠️ Problemas reportados
          <span class="badge-count problema" id="countProblemas">0</span>
        </h2>
        <div id="listaProblemas"></div>
      </div>

    </div>

  </div>

  <div class="modal-foto" id="modalFoto" onclick="this.classList.remove('show')">
    <img id="modalFotoImg" src="" alt="">
  </div>

  <!-- v3.15.0: Modal Gerar NF Devolucao -->
  <div id="modalGerarDevolucao" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:3000; align-items:center; justify-content:center; padding:20px;">
    <div style="background:white; border-radius:12px; max-width:560px; width:100%; max-height:90vh; overflow-y:auto; padding:24px;">
      <div id="modalGerarConteudo">
        <!-- conteudo dinamico -->
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let dados = { aprovadas: [], problemas: [] };

    async function carregar() {
      document.getElementById('loadingArea').style.display = '';
      document.getElementById('secoes').style.display = 'none';

      try {
        const r = await fetch('/api/admin/devolucoes');
        const d = await r.json();
        if (!d.ok) {
          if (r.status === 401) {
            location.href = '/';
            return;
          }
          throw new Error(d.erro || 'falha');
        }
        dados = d;
        renderizar();
      } catch (err) {
        toast('Erro: ' + err.message, 'err');
      } finally {
        document.getElementById('loadingArea').style.display = 'none';
        document.getElementById('secoes').style.display = '';
      }
    }

    function renderizar() {
      const mostrarConcluidos = document.getElementById('mostrarConcluidos').checked;
      const busca = (document.getElementById('filtroBusca').value || '').trim().toLowerCase();
      const dataIni = document.getElementById('filtroDataIni').value;
      const dataFim = document.getElementById('filtroDataFim').value;

      const dataIniMs = dataIni ? new Date(dataIni + 'T00:00:00').getTime() : null;
      const dataFimMs = dataFim ? new Date(dataFim + 'T23:59:59').getTime() : null;

      function passa(d) {
        // Status
        if (!mostrarConcluidos && d.status === 'concluido') return false;
        // Data (usa created_at)
        if (dataIniMs || dataFimMs) {
          const t = new Date(d.created_at).getTime();
          if (dataIniMs && t < dataIniMs) return false;
          if (dataFimMs && t > dataFimMs) return false;
        }
        // Busca
        if (busca) {
          const campos = [
            d.nf_numero, d.order_id, d.pack_id, d.shipment_id,
            d.produto_titulo, d.produto_sku, d.produto_mlb,
            d.buyer_nome, d.buyer_id,
            d.problema_descricao,
          ].map(v => String(v || '').toLowerCase());
          if (!campos.some(c => c.includes(busca))) return false;
        }
        return true;
      }

      const aprovadas = dados.aprovadas.filter(passa);
      const problemas = dados.problemas.filter(passa);

      document.getElementById('countAprovadas').textContent = aprovadas.length;
      document.getElementById('countProblemas').textContent = problemas.length;
      document.getElementById('countAprovadas').className = 'badge-count' + (aprovadas.length === 0 ? ' zero' : '');
      document.getElementById('countProblemas').className = 'badge-count problema' + (problemas.length === 0 ? ' zero' : '');

      // Info no canto direito
      const totalGeral = dados.aprovadas.length + dados.problemas.length;
      const totalFiltrado = aprovadas.length + problemas.length;
      const info = document.getElementById('resultadoInfo');
      if (busca || dataIni || dataFim) {
        info.textContent = `${totalFiltrado} de ${totalGeral} registros`;
      } else {
        info.textContent = `${totalGeral} registros (ultimos 30 dias)`;
      }

      document.getElementById('listaAprovadas').innerHTML = aprovadas.length
        ? aprovadas.map(itemHtmlAprovado).join('')
        : '<div class="vazio">Nenhuma devolucao aprovada pendente. 🎉</div>';

      document.getElementById('listaProblemas').innerHTML = problemas.length
        ? problemas.map(itemHtmlProblema).join('')
        : '<div class="vazio">Nenhum problema reportado. 🎉</div>';
    }

    function limparBusca() {
      document.getElementById('filtroBusca').value = '';
      // Volta pras datas padrao (4 meses)
      setarDatasPadrao(true);
      renderizar();
    }

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }
    function moeda(v) {
      if (v == null) return '-';
      return 'R$ ' + Number(v).toFixed(2).replace('.', ',');
    }
    function dataFmt(iso) {
      if (!iso) return '-';
      try { return new Date(iso).toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' }); }
      catch { return iso; }
    }

    function itemHtmlAprovado(d) {
      const concluido = d.status === 'concluido';
      const desc = (d.problema_descricao || '').replace(/^Aprovado por\s+/, '');
      return `
        <div class="item ${concluido ? 'concluido' : ''}">
          <div class="item-header">
            <div>
              <div class="item-titulo">${escapeHtml(d.produto_titulo || '-')}</div>
              <div class="item-data">por ${escapeHtml(desc)} · ${dataFmt(d.created_at)}</div>
            </div>
            ${concluido ? '<span style="background:#999;color:white;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700;">CONCLUIDO</span>' : ''}
          </div>
          <div class="item-detalhes">
            <strong>${escapeHtml(d.produto_sku || '-')}</strong> ·
            <strong>${d.produto_qtd || '-'} un</strong> ·
            ${moeda(d.produto_valor_unit)}<br>
            <strong>NF:</strong> ${escapeHtml(d.nf_numero || '-')} ·
            <strong>Cliente:</strong> ${escapeHtml(d.buyer_nome || '-')}<br>
            <strong>Order ML:</strong> ${d.order_id
              ? `<a href="https://www.mercadolivre.com.br/vendas/${d.order_id}/detalhe" target="_blank" style="color:#FFE600;font-weight:700;text-decoration:none;background:#1a1a1a;padding:2px 8px;border-radius:4px;font-family:monospace;">${d.order_id} 🔗</a>`
              : '<code>-</code>'}
            ${d.pack_id ? ` · <strong>Pack:</strong> <code>${d.pack_id}</code>` : ''}
            ${d.shipment_id ? ` · <strong>Shipment:</strong> <code>${d.shipment_id}</code>` : ''}
          </div>
          ${concluido ? '' : `
            <div class="item-acoes">
              ${d.nf_link_danfe ? `<a class="btn btn-cinza" href="${d.nf_link_danfe}" target="_blank">📄 Ver DANFE</a>` : ''}
              ${d.nf_id_bling
                ? `<a class="btn btn-verde" href="https://www.bling.com.br/notas.fiscais.php#edit/${d.nf_id_bling}" target="_blank" title="Abre a NF. Pra gerar devolu\u00e7\u00e3o automaticamente, use o bot\u00e3o ao lado.">🔗 Abrir NF no Bling</a>`
                : `<a class="btn" href="https://www.bling.com.br/notas.fiscais.php#list" target="_blank" onclick="copiarNF('${escapeHtml(d.nf_numero || '')}')">🔗 Abrir lista Bling (copia NF)</a>`
              }
              ${d.nf_id_bling && !d.nf_devolucao_id_bling
                ? `<button class="btn" style="background:#1565c0;" onclick="abrirModalGerarDevolucao('${d.id}', '${d.nf_id_bling}', '${escapeHtml(d.nf_numero || '')}', '${escapeHtml(d.produto_titulo || '')}')" title="Cria rascunho de NF de devolu\u00e7\u00e3o no Bling automaticamente">🧾 Gerar NF Devolu\u00e7\u00e3o</button>`
                : d.nf_devolucao_id_bling
                  ? `<a class="btn btn-verde" href="https://www.bling.com.br/notas.entrada.php#edit/${d.nf_devolucao_id_bling}" target="_blank" title="NF de devolu\u00e7\u00e3o j\u00e1 gerada (rascunho)">📝 Rascunho criado: ${d.nf_devolucao_numero || 'ver'}</a>`
                  : ''
              }
              <button class="btn btn-verde" onclick="concluir('${d.id}')">✅ Marcar como concluido</button>
              <button class="btn btn-vermelho" onclick="deletar('${d.id}')" title="Deletar (caso erro)">🗑️</button>
            </div>
          `}
        </div>
      `;
    }

    function itemHtmlProblema(d) {
      const concluido = d.status === 'concluido';
      const fotos = Array.isArray(d.problema_fotos) ? d.problema_fotos : [];
      const desc = d.problema_descricao || '';
      return `
        <div class="item problema ${concluido ? 'concluido' : ''}">
          <div class="item-header">
            <div>
              <div class="item-titulo">${escapeHtml(d.produto_titulo || '-')}</div>
              <div class="item-data">${dataFmt(d.created_at)}</div>
            </div>
            ${concluido ? '<span style="background:#999;color:white;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700;">RESOLVIDO</span>' : ''}
          </div>
          <div class="item-detalhes">
            <strong>${escapeHtml(d.produto_sku || '-')}</strong> ·
            <strong>${d.produto_qtd || '-'} un</strong> ·
            ${moeda(d.produto_valor_unit)}<br>
            <strong>NF:</strong> ${escapeHtml(d.nf_numero || '-')} ·
            <strong>Cliente:</strong> ${escapeHtml(d.buyer_nome || '-')}<br>
            <strong>Order ML:</strong> ${d.order_id
              ? `<a href="https://www.mercadolivre.com.br/vendas/${d.order_id}/detalhe" target="_blank" style="color:#FFE600;font-weight:700;text-decoration:none;background:#1a1a1a;padding:2px 8px;border-radius:4px;font-family:monospace;">${d.order_id} 🔗</a>`
              : '<code>-</code>'}
            ${d.pack_id ? ` · <strong>Pack:</strong> <code>${d.pack_id}</code>` : ''}
            ${d.shipment_id ? ` · <strong>Shipment:</strong> <code>${d.shipment_id}</code>` : ''}
          </div>
          ${desc ? `<div class="descricao-problema">💬 ${escapeHtml(desc)}</div>` : ''}
          ${fotos.length ? `
            <div class="fotos-mini">
              ${fotos.map(url => `<img src="${url}" onclick="abrirFoto('${url}')" alt="foto">`).join('')}
            </div>
            <div style="margin-top:8px;">
              <button class="btn" style="background:#1565c0;color:white;" onclick='baixarTodasFotos(${JSON.stringify(fotos)}, "${escapeHtml(d.nf_numero || d.order_id || d.id)}")'>
                📥 Baixar todas as fotos (${fotos.length})
              </button>
            </div>
          ` : ''}
          ${concluido ? '' : `
            <div class="item-acoes">
              ${d.nf_link_danfe ? `<a class="btn btn-cinza" href="${d.nf_link_danfe}" target="_blank">📄 DANFE</a>` : ''}
              <button class="btn btn-verde" onclick="concluir('${d.id}')">✅ Marcar como resolvido</button>
              <button class="btn btn-vermelho" onclick="deletar('${d.id}')">🗑️</button>
            </div>
          `}
        </div>
      `;
    }

    function abrirFoto(url) {
      document.getElementById('modalFotoImg').src = url;
      document.getElementById('modalFoto').classList.add('show');
    }

    // Baixa todas as fotos sequencialmente (sem zip - mais simples e funciona em todos navegadores)
    async function baixarTodasFotos(urls, identificador) {
      if (!urls || urls.length === 0) return;
      toast(`Baixando ${urls.length} fotos...`, 'ok');
      for (let i = 0; i < urls.length; i++) {
        try {
          const r = await fetch(urls[i]);
          const blob = await r.blob();
          const link = document.createElement('a');
          link.href = URL.createObjectURL(blob);
          link.download = `${identificador}_foto_${String(i + 1).padStart(2, '0')}.jpg`;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          URL.revokeObjectURL(link.href);
          await new Promise(resolve => setTimeout(resolve, 300));
        } catch (e) {
          console.error('Erro ao baixar foto', i + 1, e);
        }
      }
      toast(`✅ ${urls.length} fotos baixadas!`, 'ok');
    }

    function copiarNF(num) {
      if (!num) return;
      navigator.clipboard?.writeText(num).then(() => {
        toast('NF ' + num + ' copiada! Cola na busca do Bling.', 'ok');
      }).catch(() => {});
    }

    async function concluir(id) {
      if (!confirm('Marcar como concluido?')) return;
      try {
        const r = await fetch('/api/admin/concluir/' + id, { method: 'PUT' });
        const d = await r.json();
        if (d.ok) {
          toast('Concluido!', 'ok');
          carregar();
        } else {
          toast('Erro: ' + (d.erro || 'falha'), 'err');
        }
      } catch (err) {
        toast('Erro de conexao', 'err');
      }
    }

    async function deletar(id) {
      if (!confirm('Deletar permanentemente este registro?')) return;
      try {
        const r = await fetch('/api/admin/devolucao/' + id, { method: 'DELETE' });
        const d = await r.json();
        if (d.ok) {
          toast('Deletado!', 'ok');
          carregar();
        } else {
          toast('Erro: ' + (d.erro || 'falha'), 'err');
        }
      } catch (err) {
        toast('Erro de conexao', 'err');
      }
    }

    async function logout(e) {
      e.preventDefault();
      try { await fetch('/api/auth/logout', { method: 'POST' }); } catch (err) {}
      location.href = '/';
    }

    let toastTimeout;
    function toast(msg, tipo = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show ' + (tipo || '');
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => t.classList.remove('show'), 3000);
    }

    // Pre-setar datas: 4 meses atras ate hoje (sempre baseado no dia atual)
    function setarDatasPadrao(forcar) {
      const hoje = new Date();
      const dataFim = hoje.toISOString().slice(0, 10);

      const inicio = new Date();
      inicio.setMonth(inicio.getMonth() - 4);
      const dataIni = inicio.toISOString().slice(0, 10);

      const inputIni = document.getElementById('filtroDataIni');
      const inputFim = document.getElementById('filtroDataFim');

      // So seta se nao tiver valor OU forcar=true
      if (forcar || !inputIni.value) inputIni.value = dataIni;
      if (forcar || !inputFim.value) inputFim.value = dataFim;
    }

    // Listeners (filtros aplicam ao mudar - busca em tempo real)
    document.getElementById('mostrarConcluidos').addEventListener('change', renderizar);
    document.getElementById('filtroBusca').addEventListener('input', renderizar);
    document.getElementById('filtroDataIni').addEventListener('change', renderizar);
    document.getElementById('filtroDataFim').addEventListener('change', renderizar);

    // ============================================================
    // v3.15.0 - GERAR NF DEVOLUCAO (Fase 3B)
    // ============================================================
    // Fluxo:
    //  1. Diego clica "Gerar NF Devolucao" no card
    //  2. Backend busca NF original via API v3 oficial -> retorna produtos+contato
    //  3. Frontend monta XML xajax e chama /services/notas.fiscais.server.php?f=salvarNotaDevolucao
    //     (com credentials:'include' usa cookie de sessao do Diego no Bling)
    //  4. Bling cria rascunho e devolve {idNotaDevolucao, dadosEmissao:{numero, situacao:1}}
    //  5. Backend salva idNotaDevolucao no Supabase
    //  6. Frontend mostra "Rascunho criado: NF nº XXXX [Abrir no Bling]"
    //  7. Diego abre, revisa, transmite manual no Bling

    // IDs FIXOS DA GOOD IMPORT (descobertos por captura de fetch real do Bling)
    const GOOD_BLING = {
      idEmpresaControl: '4956030980',
      idNaturezaOperacao: '5776118802',  // "Devolucao de Mercadoria - Entrada"
    };

    function abrirModalGerarDevolucao(devolucaoId, idNFOriginalBling, nfNumero, produtoTitulo) {
      const conteudo = document.getElementById('modalGerarConteudo');
      conteudo.innerHTML = `
        <h3 style="font-size:18px; margin-bottom:12px;">🧾 Gerar NF Devolução</h3>
        <p style="font-size:14px; color:#555; margin-bottom:16px;">
          Vamos criar um <strong>rascunho</strong> de NF de devolução de entrada no Bling pra esta venda:
        </p>
        <div style="background:#f5f5f7; padding:12px; border-radius:8px; font-size:13px; margin-bottom:16px;">
          <div><strong>NF original:</strong> ${escapeHtml(nfNumero)}</div>
          <div><strong>Produto:</strong> ${escapeHtml(produtoTitulo)}</div>
        </div>
        <p style="font-size:13px; color:#666; margin-bottom:16px;">
          ⚠️ Após criar, <strong>você abre no Bling</strong>, revisa e transmite manualmente. O rascunho NÃO é transmitido pra SEFAZ automaticamente.
        </p>
        <div style="display:flex; gap:8px; justify-content:flex-end;">
          <button class="btn btn-cinza" onclick="fecharModalGerarDevolucao()">Cancelar</button>
          <button class="btn btn-verde" id="btnConfirmarGerar"
            onclick="confirmarGerarDevolucao('${devolucaoId}', '${idNFOriginalBling}')">
            Criar Rascunho
          </button>
        </div>
      `;
      document.getElementById('modalGerarDevolucao').style.display = 'flex';
    }

    function fecharModalGerarDevolucao() {
      document.getElementById('modalGerarDevolucao').style.display = 'none';
    }

    async function confirmarGerarDevolucao(devolucaoId, idNFOriginalBling) {
      const btn = document.getElementById('btnConfirmarGerar');
      const conteudo = document.getElementById('modalGerarConteudo');

      // Loading
      conteudo.innerHTML = `
        <h3 style="font-size:18px; margin-bottom:12px;">🧾 Gerando NF Devolução...</h3>
        <div style="text-align:center; padding:30px;">
          <div class="spinner" style="display:inline-block; width:36px; height:36px; border:4px solid #f0f0f0; border-top-color:#1565c0; border-radius:50%; animation:spin 0.8s linear infinite;"></div>
          <p id="statusGerar" style="margin-top:14px; color:#555; font-size:14px;">
            Buscando dados da NF no Bling...
          </p>
        </div>
      `;

      try {
        // PASSO 1: Backend busca dados da NF original via API v3 oficial
        const r1 = await fetch(`/api/admin/preparar-devolucao/${idNFOriginalBling}`);
        const d1 = await r1.json();
        if (!d1.ok) {
          throw new Error(d1.erro || 'Falha ao buscar dados da NF no Bling');
        }
        const { produtos, contato } = d1;
        if (!produtos || produtos.length === 0) {
          throw new Error('NF sem produtos');
        }
        if (!contato || !contato.id) {
          throw new Error('NF sem dados do contato');
        }

        // PASSO 2: Monta XML xajax e chama Bling direto (com cookie de sessao)
        document.getElementById('statusGerar').textContent = 'Criando rascunho no Bling...';

        const xml = montarXmlDevolucao(produtos, contato);
        const body =
          'xajax=salvarNotaDevolucao' +
          '&xajaxr=' + Date.now() +
          '&xajaxargs[]=' + encodeURIComponent(idNFOriginalBling) +
          '&xajaxargs[]=' + encodeURIComponent(xml) +
          '&xajaxargs[]=false';

        const r2 = await fetch('https://www.bling.com.br/services/notas.fiscais.server.php?f=salvarNotaDevolucao', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: body
        });

        if (!r2.ok) {
          throw new Error(`Bling respondeu HTTP ${r2.status}. Confirme que voce esta logado no Bling em outra aba.`);
        }

        const result = await r2.json();
        if (!result || !result.idNotaDevolucao) {
          throw new Error('Bling nao retornou ID da NF: ' + JSON.stringify(result).slice(0, 200));
        }

        const idNFDevolucao = result.idNotaDevolucao;
        const numeroNF = result.dadosEmissao?.numero || '?';

        // PASSO 3: Salva no Supabase pra nao gerar de novo
        document.getElementById('statusGerar').textContent = 'Registrando no sistema...';

        try {
          await fetch(`/api/admin/registrar-devolucao-gerada/${devolucaoId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              nf_devolucao_id_bling: String(idNFDevolucao),
              nf_devolucao_numero: String(numeroNF),
            }),
          });
        } catch (e) {
          console.warn('Falha ao registrar no Supabase (nao critico):', e);
        }

        // PASSO 4: Mostra sucesso
        const linkBling = `https://www.bling.com.br/notas.entrada.php#edit/${idNFDevolucao}`;
        conteudo.innerHTML = `
          <h3 style="font-size:18px; margin-bottom:12px; color:#2e7d32;">✅ Rascunho criado!</h3>
          <div style="background:#e8f5e9; padding:14px; border-radius:8px; margin-bottom:16px;">
            <div style="font-size:14px; color:#1b5e20;">
              <strong>NF nº ${escapeHtml(String(numeroNF))}</strong> criada como <strong>rascunho</strong> no Bling.
            </div>
            <div style="font-size:12px; color:#388e3c; margin-top:6px;">
              ID: ${idNFDevolucao}
            </div>
          </div>
          <p style="font-size:13px; color:#555; margin-bottom:16px;">
            Próximos passos: abrir no Bling, revisar dados, e clicar em <strong>Salvar/Transmitir</strong>.
          </p>
          <div style="display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap;">
            <button class="btn btn-cinza" onclick="fecharModalGerarDevolucao()">Fechar</button>
            <a class="btn btn-verde" href="${linkBling}" target="_blank" onclick="setTimeout(()=>{ fecharModalGerarDevolucao(); carregar(); }, 500)">
              🔗 Abrir Rascunho no Bling
            </a>
          </div>
        `;
        toast('Rascunho criado: NF nº ' + numeroNF, 'ok');

      } catch (err) {
        console.error('Erro gerar devolucao:', err);
        conteudo.innerHTML = `
          <h3 style="font-size:18px; margin-bottom:12px; color:#c62828;">❌ Erro ao gerar</h3>
          <div style="background:#ffebee; padding:14px; border-radius:8px; margin-bottom:16px; font-size:13px; color:#b71c1c;">
            ${escapeHtml(err.message || String(err))}
          </div>
          <div style="font-size:13px; color:#555; margin-bottom:16px;">
            <strong>Possíveis causas:</strong><br>
            • Você não está logado no Bling em outra aba<br>
            • A NF original já tem todas devoluções emitidas<br>
            • Bling mudou o endpoint interno (raro)<br><br>
            <strong>Alternativa:</strong> abre a NF no Bling e gera devolução manualmente pelo menu de 3 pontos.
          </div>
          <div style="display:flex; gap:8px; justify-content:flex-end;">
            <button class="btn btn-cinza" onclick="fecharModalGerarDevolucao()">Fechar</button>
          </div>
        `;
        toast('Erro: ' + (err.message || err), 'err');
      }
    }

    // Monta o XML proprietario do framework xajax do Bling
    // Formato descoberto via captura de fetch real (30/04/2026)
    function montarXmlDevolucao(produtos, contato) {
      // produtos = [{ idBling, quantidade, valor }]
      // contato = { id, nome, tipo, cnpj, ie, indIEDest, rg, cep, cidade, idMunicipio, uf, endereco, enderecoNro, bairro, complemento, email, fone, celular, dataNascimento, nomePais, idPais }

      // Helper: monta um <e><k>...</k><v>...</v></e>
      function entry(key, valueXml) {
        return `<e><k>${escapeXajax(key)}</k><v>${valueXml}</v></e>`;
      }
      // Helper: valor leaf (texto simples, ja escapado)
      function leaf(value) {
        return escapeXajax(value == null ? '' : String(value));
      }

      // Bloco produtos: { idBling: { quantidade, valor } }
      const produtosXml = '<xjxobj>' + produtos.map(p => {
        const inner = '<xjxobj>' +
          entry('quantidade', leaf(formatarQtde(p.quantidade))) +
          entry('valor', leaf(formatarValor(p.valor))) +
        '</xjxobj>';
        return entry(String(p.idBling), inner);
      }).join('') + '</xjxobj>';

      // Bloco contato (mesma ordem que o Bling envia, por garantia)
      const contatoXml = '<xjxobj>' +
        entry('nome',           leaf(contato.nome)) +
        entry('id',             leaf(contato.id)) +
        entry('tipo',           leaf(contato.tipo || 'F')) +
        entry('cnpj',           leaf(contato.cnpj || contato.cpf || '')) +
        entry('ie',             leaf(contato.ie || '')) +
        entry('indIEDest',      leaf(contato.indIEDest || '9')) +
        entry('rg',             leaf(contato.rg || '')) +
        entry('nomePais',       leaf(contato.nomePais || '')) +
        entry('idPais',         leaf(contato.idPais || '')) +
        entry('cep',            leaf(contato.cep || '')) +
        entry('cidade',         leaf(contato.cidade || '')) +
        entry('idMunicipio',    leaf(contato.idMunicipio || '')) +
        entry('uf',             leaf(contato.uf || '')) +
        entry('endereco',       leaf(contato.endereco || '')) +
        entry('enderecoNro',    leaf(contato.enderecoNro || '')) +
        entry('bairro',         leaf(contato.bairro || '')) +
        entry('complemento',    leaf(contato.complemento || '')) +
        entry('email',          leaf(contato.email || '')) +
        entry('fone',           leaf(contato.fone || '')) +
        entry('celular',        leaf(contato.celular || '')) +
        entry('dataNascimento', leaf(contato.dataNascimento || '')) +
      '</xjxobj>';

      // Bloco raiz
      const xml = '<xjxobj>' +
        entry('produtos', produtosXml) +
        entry('contato', contatoXml) +
        entry('idNaturezaOperacao', leaf(GOOD_BLING.idNaturezaOperacao)) +
        entry('idEmpresaControl', leaf(GOOD_BLING.idEmpresaControl)) +
      '</xjxobj>';

      return xml;
    }

    // Escapa caracteres XML mas SEM tocar em UTF-8 (acentos passam direto)
    function escapeXajax(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // Quantidade no formato Bling: virgula brasileira, 2 casas
    function formatarQtde(q) {
      const n = Number(q);
      if (!isFinite(n)) return '1,00';
      return n.toFixed(2).replace('.', ',');
    }

    // Valor unitario no formato Bling: virgula brasileira, 10 casas (decimais.price=10)
    function formatarValor(v) {
      const n = Number(v);
      if (!isFinite(n)) return '0,0000000000';
      return n.toFixed(10).replace('.', ',');
    }

    // Pre-seta datas e carrega
    setarDatasPadrao();
    carregar();
  </script>
</body>
