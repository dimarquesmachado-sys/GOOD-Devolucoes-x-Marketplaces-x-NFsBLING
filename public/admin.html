<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - GOOD Devolucoes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f7; min-height: 100vh; padding: 12px; color: #1d1d1f;
    }
    .container { max-width: 1200px; margin: 0 auto; }

    header {
      background: linear-gradient(135deg, #1d1d1f 0%, #3a3a3c 100%);
      border-radius: 12px; padding: 20px; margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15); color: white;
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 20px; }
    header p { font-size: 12px; opacity: 0.7; margin-top: 2px; }
    .header-acoes a {
      color: white; padding: 8px 14px; background: rgba(255,255,255,0.15);
      border-radius: 8px; text-decoration: none; font-size: 13px; font-weight: 600;
      margin-left: 8px;
    }
    .header-acoes a:hover { background: rgba(255,255,255,0.25); }

    .secoes {
      display: grid; grid-template-columns: 1fr; gap: 14px;
    }
    @media (min-width: 1000px) {
      .secoes { grid-template-columns: 1fr 1fr; }
    }

    .secao {
      background: white; border-radius: 12px; padding: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .secao h2 {
      font-size: 16px; margin-bottom: 12px; padding-bottom: 8px;
      border-bottom: 2px solid #f0f0f0;
      display: flex; align-items: center; gap: 8px;
    }
    .badge-count {
      background: #007AFF; color: white; padding: 2px 8px;
      border-radius: 10px; font-size: 12px; font-weight: 700; margin-left: auto;
    }
    .badge-count.zero { background: #999; }
    .badge-count.problema { background: #c62828; }

    .item {
      background: #fafafa; border-radius: 10px; padding: 14px;
      margin-bottom: 10px; border-left: 4px solid #43a047;
    }
    .item.problema { border-left-color: #c62828; background: #fff5f5; }
    .item.concluido { opacity: 0.6; border-left-color: #999; background: #f0f0f0; }

    .item-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 8px;
    }
    .item-titulo {
      font-size: 14px; font-weight: 700; color: #1d1d1f;
    }
    .item-data {
      font-size: 11px; color: #888;
    }
    .item-detalhes {
      font-size: 12px; color: #555; line-height: 1.6;
    }
    .item-detalhes strong { color: #1d1d1f; }
    .item-acoes {
      display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;
    }
    .btn {
      padding: 8px 12px; background: #007AFF; color: white; border: none;
      border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer;
      text-decoration: none; display: inline-block; font-family: inherit;
    }
    .btn:hover { background: #0051D5; }
    .btn-verde { background: #2e7d32; }
    .btn-verde:hover { background: #1b5e20; }
    .btn-cinza { background: #6c757d; }
    .btn-cinza:hover { background: #495057; }
    .btn-vermelho { background: #c62828; }
    .btn-vermelho:hover { background: #b71c1c; }

    .vazio {
      text-align: center; padding: 40px 20px; color: #999; font-size: 14px;
    }

    .fotos-mini {
      display: flex; gap: 6px; flex-wrap: wrap; margin: 10px 0;
    }
    .fotos-mini img {
      width: 70px; height: 70px; object-fit: cover; border-radius: 6px;
      border: 1px solid #ddd; cursor: pointer; transition: transform 0.1s;
    }
    .fotos-mini img:hover { transform: scale(1.05); border-color: #007AFF; }

    .descricao-problema {
      background: white; border: 1px solid #fde68a; border-radius: 8px;
      padding: 8px 10px; margin-top: 8px; font-size: 13px;
      color: #92400e; font-style: italic; line-height: 1.5;
    }

    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #1d1d1f; color: white; padding: 12px 20px; border-radius: 10px;
      font-size: 14px; font-weight: 600; box-shadow: 0 4px 14px rgba(0,0,0,0.3);
      z-index: 2000; opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast.ok { background: #2e7d32; }
    .toast.err { background: #c62828; }

    /* Modal foto fullscreen */
    .modal-foto {
      position: fixed; top:0;left:0;right:0;bottom:0;
      background: rgba(0,0,0,0.9); display: none; align-items: center;
      justify-content: center; z-index: 3000; padding: 20px; cursor: pointer;
    }
    .modal-foto.show { display: flex; }
    .modal-foto img {
      max-width: 100%; max-height: 100%; border-radius: 8px;
    }

    .filtros {
      background: white; border-radius: 10px; padding: 12px 16px;
      margin-bottom: 14px; display: flex; gap: 12px; align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06); font-size: 13px;
    }
    .filtros label {
      display: flex; align-items: center; gap: 6px; cursor: pointer;
      user-select: none;
    }
    .filtros button {
      margin-left: auto; padding: 8px 14px; background: #007AFF; color: white;
      border: none; border-radius: 6px; font-size: 13px; font-weight: 600;
      cursor: pointer;
    }
    .loading { text-align: center; padding: 40px; color: #666; }
    .loading .spinner {
      display: inline-block; width: 28px; height: 28px;
      border: 3px solid #f0f0f0; border-top-color: #007AFF;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>🔐 Admin - GOOD Devolucoes</h1>
        <p>Painel restrito · v3.6</p>
      </div>
      <div class="header-acoes">
        <a href="/" target="_blank">📦 Tela estoquista</a>
        <a href="#" onclick="logout(event)">🚪 Sair</a>
      </div>
    </header>

    <div class="filtros">
      <label>
        <input type="checkbox" id="mostrarConcluidos">
        Mostrar concluidos
      </label>
      <button onclick="carregar()">🔄 Atualizar</button>
    </div>

    <div id="loadingArea" class="loading">
      <div class="spinner"></div>
      <p style="margin-top:12px;">Carregando devolucoes...</p>
    </div>

    <div class="secoes" id="secoes" style="display:none;">

      <div class="secao">
        <h2>
          ✅ Aprovadas - aguardando NF
          <span class="badge-count" id="countAprovadas">0</span>
        </h2>
        <div id="listaAprovadas"></div>
      </div>

      <div class="secao">
        <h2>
          ⚠️ Problemas reportados
          <span class="badge-count problema" id="countProblemas">0</span>
        </h2>
        <div id="listaProblemas"></div>
      </div>

    </div>

  </div>

  <div class="modal-foto" id="modalFoto" onclick="this.classList.remove('show')">
    <img id="modalFotoImg" src="" alt="">
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let dados = { aprovadas: [], problemas: [] };

    async function carregar() {
      document.getElementById('loadingArea').style.display = '';
      document.getElementById('secoes').style.display = 'none';

      try {
        const r = await fetch('/api/admin/devolucoes');
        const d = await r.json();
        if (!d.ok) {
          if (r.status === 401) {
            location.href = '/admin-login.html';
            return;
          }
          throw new Error(d.erro || 'falha');
        }
        dados = d;
        renderizar();
      } catch (err) {
        toast('Erro: ' + err.message, 'err');
      } finally {
        document.getElementById('loadingArea').style.display = 'none';
        document.getElementById('secoes').style.display = '';
      }
    }

    function renderizar() {
      const mostrarConcluidos = document.getElementById('mostrarConcluidos').checked;
      const filtrar = list => mostrarConcluidos ? list : list.filter(d => d.status !== 'concluido');

      const aprovadas = filtrar(dados.aprovadas);
      const problemas = filtrar(dados.problemas);

      document.getElementById('countAprovadas').textContent = aprovadas.length;
      document.getElementById('countProblemas').textContent = problemas.length;
      document.getElementById('countAprovadas').className = 'badge-count' + (aprovadas.length === 0 ? ' zero' : '');
      document.getElementById('countProblemas').className = 'badge-count problema' + (problemas.length === 0 ? ' zero' : '');

      document.getElementById('listaAprovadas').innerHTML = aprovadas.length
        ? aprovadas.map(itemHtmlAprovado).join('')
        : '<div class="vazio">Nenhuma devolucao aprovada pendente. 🎉</div>';

      document.getElementById('listaProblemas').innerHTML = problemas.length
        ? problemas.map(itemHtmlProblema).join('')
        : '<div class="vazio">Nenhum problema reportado. 🎉</div>';
    }

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }
    function moeda(v) {
      if (v == null) return '-';
      return 'R$ ' + Number(v).toFixed(2).replace('.', ',');
    }
    function dataFmt(iso) {
      if (!iso) return '-';
      try { return new Date(iso).toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' }); }
      catch { return iso; }
    }

    function itemHtmlAprovado(d) {
      const concluido = d.status === 'concluido';
      const desc = (d.problema_descricao || '').replace(/^Aprovado por\s+/, '');
      return `
        <div class="item ${concluido ? 'concluido' : ''}">
          <div class="item-header">
            <div>
              <div class="item-titulo">${escapeHtml(d.produto_titulo || '-')}</div>
              <div class="item-data">por ${escapeHtml(desc)} · ${dataFmt(d.created_at)}</div>
            </div>
            ${concluido ? '<span style="background:#999;color:white;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700;">CONCLUIDO</span>' : ''}
          </div>
          <div class="item-detalhes">
            <strong>${escapeHtml(d.produto_sku || '-')}</strong> ·
            <strong>${d.produto_qtd || '-'} un</strong> ·
            ${moeda(d.produto_valor_unit)}<br>
            <strong>NF:</strong> ${escapeHtml(d.nf_numero || '-')} ·
            <strong>Cliente:</strong> ${escapeHtml(d.buyer_nome || '-')}<br>
            <strong>Order ML:</strong> <code>${d.order_id || '-'}</code>
          </div>
          ${concluido ? '' : `
            <div class="item-acoes">
              ${d.nf_link_danfe ? `<a class="btn btn-cinza" href="${d.nf_link_danfe}" target="_blank">📄 Ver DANFE</a>` : ''}
              <a class="btn" href="https://www.bling.com.br/notas.fiscais.php#list" target="_blank" onclick="copiarNF('${escapeHtml(d.nf_numero || '')}')">🔗 Abrir Bling</a>
              <button class="btn btn-verde" onclick="concluir('${d.id}')">✅ Marcar como concluido</button>
              <button class="btn btn-vermelho" onclick="deletar('${d.id}')" title="Deletar (caso erro)">🗑️</button>
            </div>
          `}
        </div>
      `;
    }

    function itemHtmlProblema(d) {
      const concluido = d.status === 'concluido';
      const fotos = Array.isArray(d.problema_fotos) ? d.problema_fotos : [];
      const desc = d.problema_descricao || '';
      return `
        <div class="item problema ${concluido ? 'concluido' : ''}">
          <div class="item-header">
            <div>
              <div class="item-titulo">${escapeHtml(d.produto_titulo || '-')}</div>
              <div class="item-data">${dataFmt(d.created_at)}</div>
            </div>
            ${concluido ? '<span style="background:#999;color:white;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700;">RESOLVIDO</span>' : ''}
          </div>
          <div class="item-detalhes">
            <strong>${escapeHtml(d.produto_sku || '-')}</strong> ·
            <strong>${d.produto_qtd || '-'} un</strong> ·
            ${moeda(d.produto_valor_unit)}<br>
            <strong>NF:</strong> ${escapeHtml(d.nf_numero || '-')} ·
            <strong>Cliente:</strong> ${escapeHtml(d.buyer_nome || '-')}
          </div>
          ${desc ? `<div class="descricao-problema">💬 ${escapeHtml(desc)}</div>` : ''}
          ${fotos.length ? `
            <div class="fotos-mini">
              ${fotos.map(url => `<img src="${url}" onclick="abrirFoto('${url}')" alt="foto">`).join('')}
            </div>
          ` : ''}
          ${concluido ? '' : `
            <div class="item-acoes">
              ${d.nf_link_danfe ? `<a class="btn btn-cinza" href="${d.nf_link_danfe}" target="_blank">📄 DANFE</a>` : ''}
              <button class="btn btn-verde" onclick="concluir('${d.id}')">✅ Marcar como resolvido</button>
              <button class="btn btn-vermelho" onclick="deletar('${d.id}')">🗑️</button>
            </div>
          `}
        </div>
      `;
    }

    function abrirFoto(url) {
      document.getElementById('modalFotoImg').src = url;
      document.getElementById('modalFoto').classList.add('show');
    }

    function copiarNF(num) {
      if (!num) return;
      navigator.clipboard?.writeText(num).then(() => {
        toast('NF ' + num + ' copiada! Cola na busca do Bling.', 'ok');
      }).catch(() => {});
    }

    async function concluir(id) {
      if (!confirm('Marcar como concluido?')) return;
      try {
        const r = await fetch('/api/admin/concluir/' + id, { method: 'PUT' });
        const d = await r.json();
        if (d.ok) {
          toast('Concluido!', 'ok');
          carregar();
        } else {
          toast('Erro: ' + (d.erro || 'falha'), 'err');
        }
      } catch (err) {
        toast('Erro de conexao', 'err');
      }
    }

    async function deletar(id) {
      if (!confirm('Deletar permanentemente este registro?')) return;
      try {
        const r = await fetch('/api/admin/devolucao/' + id, { method: 'DELETE' });
        const d = await r.json();
        if (d.ok) {
          toast('Deletado!', 'ok');
          carregar();
        } else {
          toast('Erro: ' + (d.erro || 'falha'), 'err');
        }
      } catch (err) {
        toast('Erro de conexao', 'err');
      }
    }

    async function logout(e) {
      e.preventDefault();
      try { await fetch('/api/auth/logout', { method: 'POST' }); } catch (err) {}
      location.href = '/admin-login.html';
    }

    let toastTimeout;
    function toast(msg, tipo = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show ' + (tipo || '');
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => t.classList.remove('show'), 3000);
    }

    document.getElementById('mostrarConcluidos').addEventListener('change', renderizar);

    carregar();
    setInterval(carregar, 30000); // auto-refresh 30s
  </script>
</body>
</html>
